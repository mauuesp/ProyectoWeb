{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-5">

<div class="card">

<div class="card-header">
Crear cuenta
</div>

<div class="card-body">

<form method="post">

{% csrf_token %}

<label>Usuario</label>
{{ form.username }}

<label>Email</label>
{{ form.email }}

<label>Contraseña</label>
{{ form.password1 }}

<label>Confirmar contraseña</label>
{{ form.password2 }}

<button type="submit" class="btn btn-primary w-100">
Registrarse
</button>

</form>

<p class="text-center mt-3">
¿Ya tienes cuenta?
<a href="/">Inicia sesión</a>
</p>

</div>

</div>

</div>
</div>

{% endblock %}
