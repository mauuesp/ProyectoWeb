{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-8">

<div class="card">

<div class="card-header">
Panel principal
</div>

<div class="card-body">

<h2 class="mb-3 text-center">
Bienvenido {{ name }}
</h2>

<p class="text-center">
{{ message }}
</p>

<hr>

<div class="row text-center">

<div class="col-md-4">
<h5>Usuario</h5>
<p>{{ name }}</p>
</div>

<div class="col-md-4">
<h5>Edad</h5>
<p>{{ age }}</p>
</div>

<div class="col-md-4">
<h5>Total en lista</h5>
<p>{{ example_list|length }}</p>
</div>

</div>

<hr>

<h5 class="mt-4">Lista de ejemplo</h5>

<ul>

{% for item in example_list %}
<li>{{ item }}</li>
{% endfor %}

</ul>

<hr>

<div class="text-center">

<form method="post" action="/logout/">
{% csrf_token %}
<button class="btn btn-danger">
Cerrar sesión
</button>
</form>

</div>

</div>

</div>

</div>
</div>

{% endblock %}
